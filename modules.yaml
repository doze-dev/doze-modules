# doze plugin modules.
#
# Each module is an out-of-process doze engine plugin — a pure-Go binary built
# from its source in this repo (modules/<name>/) and published as its own rolling
# release under
#   https://github.com/doze-dev/doze-modules/releases/download/<name>/
# with an index.yaml + per-platform archives. doze fetches a module by engine
# type, verifies its checksum, caches it under ~/.doze/modules, and runs it.
#
# Authoring/upgrading a module is a PR editing this file (bump version) + the
# source under modules/<name>/; CI cross-compiles the three supported triples and
# publishes cumulatively.
#
# triples (fixed: Apple Silicon mac + 64-bit Linux, no intel-mac per project policy):
#   aarch64-apple-darwin,
#   aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu
#
# NOTE: `process` is NOT a module — it is the supervision primitive compiled into
# doze core, so it never appears here.

# Patch bump across the board: doze-sdk moved from a local replace to the
# tagged v0.3.0, which changes -trimpath build inputs — published (version,
# triple) artifacts are immutable, so new bytes mean new versions.
modules:
  valkey:     { path: ./modules/valkey/plugin,     version: "0.2.1" }
  kvrocks:    { path: ./modules/kvrocks/plugin,    version: "0.2.1" }
  # postgres 0.2.3: role convergence is two-pass (create all, then memberships)
  # so declaration order can't break member_of; the published Example is fixed
  # (grant takes no label) and is now converged by acceptance before release.
  # 0.2.2: readiness probe passes -U postgres, so backend logs stop collecting
  # a `FATAL: role "<os-user>" does not exist` on every boot/health poll.
  postgres:   { path: ./modules/postgres/plugin,   version: "0.2.3" }
  ferret:     { path: ./modules/ferret/plugin,     version: "0.2.2" }
  mariadb:    { path: ./modules/mariadb/plugin,    version: "0.2.1" }
  # temporal 0.2.2: a declared "1.1" resolves via the mirror's major map — the
  # any-dot-is-exact rule made 0.2.1 look up a "1.1" artifact and 404 on every
  # toolchain resolve (the module was unbootable since release).
  temporal:   { path: ./modules/temporal/plugin,   version: "0.2.2" }
  s3:         { path: ./modules/s3/plugin,         version: "0.3.1" }
  sqs:        { path: ./modules/sqs/plugin,        version: "0.3.1" }
  sns:        { path: ./modules/sns/plugin,        version: "0.3.1" }
  # JVM-free single-node Kafka-protocol broker (embeds doze-kafka):
  kafka:          { path: ./modules/kafka/plugin,          version: "0.1.0" }
  # New AWS modules backed by doze-aws (pure-Go, no gofakes3/LocalStack):
  dynamodb:       { path: ./modules/dynamodb/plugin,       version: "0.1.0" }
  secretsmanager: { path: ./modules/secretsmanager/plugin, version: "0.1.0" }
  ssm:            { path: ./modules/ssm/plugin,            version: "0.1.0" }
  kms:            { path: ./modules/kms/plugin,            version: "0.1.0" }
  eventbridge:    { path: ./modules/eventbridge/plugin,    version: "0.1.0" }
  lambda:         { path: ./modules/lambda/plugin,         version: "0.1.0" }
  # Web console aggregating the AWS services (depends on the ones it surfaces):
  aws-console:    { path: ./modules/awsconsole/plugin,     version: "0.1.0" }
