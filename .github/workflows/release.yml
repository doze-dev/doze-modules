# Build and publish doze plugin modules. Plugins are pure-Go cross-compiles, so a
# single runner builds every triple — no per-platform matrix. Each module is
# published to its own rolling release (tag = module name), serving an index.yaml
# + per-platform archives that doze fetches from:
#   <repo>/releases/download/<module>/index.yaml
#
# Publishing is GATED on `go test` (the `test` job below) so a broken module can't
# ship. doze-sdk is a normal tagged dependency — plain single checkouts.
name: release

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to build ("all" or a name like "postgres")'
        required: false
        default: all
  push:
    branches: [main]
    # Rebuild on a module-source change, a manifest bump, an SDK re-pin (go.mod),
    # or tooling/workflow changes.
    paths: [modules.yaml, modules/**, cmd/**, go.mod, go.sum, .github/workflows/**]

permissions:
  contents: write

jobs:
  # Fast gate: unit tests must pass before anything is built or published. The full
  # {linux, macos} matrix runs separately in test.yml on every push/PR.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: go test ./...

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }

      # Plugins are pure-Go cross-compiles built from this repo's own source.
      - name: Build modules
        run: |
          go build -o /tmp/dzm ./cmd/dzm
          /tmp/dzm --repo "$PWD" --out dist --module "${{ inputs.module || 'all' }}"

      # Generate each module's meta.yaml from its driver's Describe() (single source
      # of truth) so publish ships it as a release asset alongside index.yaml.
      # Describers are mandatory now — a failure here is a real bug, not noise.
      - name: Generate metadata
        run: /tmp/dzm meta --out dist --module "${{ inputs.module || 'all' }}"

      # Publish each module folder to its own rolling release. gh release upload
      # --clobber merges new triples into the existing release cumulatively.
      - name: Publish per-module releases
        id: publish
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          built=()
          for dir in dist/*/; do
            name=$(basename "$dir")
            gh release view "$name" >/dev/null 2>&1 || \
              gh release create "$name" --title "$name module" --notes "doze $name plugin module"
            gh release upload "$name" "$dir"/* --clobber
            built+=("$name")
          done
          # Emit the built module names as a JSON array for the registry dispatch.
          printf '%s\n' "${built[@]}" | jq -R . | jq -sc . > /tmp/built.json
          echo "modules=$(cat /tmp/built.json)" >> "$GITHUB_OUTPUT"

      # Tell doze-registry to sign + publish the just-built modules into the signed
      # Cloudflare registry (the only path doze core actually trusts). The signing
      # key lives ONLY in doze-registry, so we dispatch rather than sign here.
      # REGISTRY_DISPATCH_TOKEN: a fine-grained PAT/App token with contents:write
      # on doze-registry (github.token cannot cross repositories).
      - name: Notify registry to sign + publish
        if: steps.publish.outputs.modules != '[]'
        env: { GH_TOKEN: '${{ secrets.REGISTRY_DISPATCH_TOKEN }}' }
        run: |
          gh api repos/doze-dev/doze-registry/dispatches \
            -f event_type=modules-published \
            -f "client_payload[modules]=${{ steps.publish.outputs.modules }}"
