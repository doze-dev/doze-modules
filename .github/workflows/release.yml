# Build and publish doze plugin modules. Plugins are pure-Go cross-compiles, so a
# single runner builds every triple — no per-platform matrix. Each module is
# published to its own rolling release (tag = module name), serving an index.yaml
# + per-platform archives that doze fetches from:
#   <repo>/releases/download/<module>/index.yaml
#
# Publishing is GATED on `go test` (the `test` job below) so a broken module can't
# ship. doze-sdk is a normal tagged dependency — plain single checkouts.
name: release

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to build ("all" or a name like "postgres")'
        required: false
        default: all
  push:
    branches: [main]
    # Rebuild on a module-source change, a manifest bump, an SDK re-pin (go.mod),
    # or tooling/workflow changes.
    paths: [modules.yaml, modules/**, cmd/**, go.mod, go.sum, .github/workflows/**]

permissions:
  contents: write

jobs:
  # Fast gate: unit tests must pass before anything is built or published. The full
  # {linux, macos} matrix runs separately in test.yml on every push/PR.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: go test ./...

  # Which modules does this event release? A version bump in modules.yaml is the
  # release intent, and NO VERSION PUBLISHES WITHOUT ITS ACCEPTANCE SUITE — the
  # layer that boots a real backend and proves the configs (including each
  # module's own published Example) actually converge. A dispatch gates the
  # named module, or every module on "all".
  bumped:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.diff.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ inputs.module }}" ] || [ "${{ inputs.module }}" = "all" ]; then
              yq -o=json -I=0 '.modules | keys' modules.yaml > /tmp/mods.json
            else
              echo '["${{ inputs.module }}"]' > /tmp/mods.json
            fi
          else
            git show HEAD^:modules.yaml > /tmp/prev.yaml 2>/dev/null || echo 'modules: {}' > /tmp/prev.yaml
            : > /tmp/list
            for m in $(yq '.modules | keys | .[]' modules.yaml); do
              cur=$(yq ".modules.$m.version" modules.yaml)
              prev=$(yq ".modules.$m.version" /tmp/prev.yaml)
              [ "$cur" != "$prev" ] && echo "$m" >> /tmp/list || true
            done
            jq -R . </tmp/list | jq -sc . > /tmp/mods.json
          fi
          echo "modules=$(cat /tmp/mods.json)" | tee -a "$GITHUB_OUTPUT"

  # Acceptance for every module being released, against the SAME prebuilt
  # doze-binaries backends users resolve — not a fresh source build, the exact
  # published bytes. A module whose backend isn't published in doze-binaries
  # fails here by design: a module users can't boot must not release. The
  # built-in engines (s3/sqs/sns) need no backend; their tagged tests just run.
  acceptance:
    needs: bumped
    if: ${{ needs.bumped.outputs.modules != '[]' && needs.bumped.outputs.modules != '' }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.bumped.outputs.modules) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: Fetch prebuilt backend(s)
        run: |
          triple=x86_64-unknown-linux-gnu
          fetch() { # <recipe> [major] -> prints the bin dir (the BINDIR contract)
            local recipe=$1 major=${2:-} idx="/tmp/$1-index.yaml" full url
            if ! curl -sfL "https://github.com/doze-dev/doze-binaries/releases/download/$recipe/index.yaml" -o "$idx"; then
              echo "::error::no prebuilt $recipe backend in doze-binaries — users cannot boot this module; publish the backend before releasing" >&2
              return 1
            fi
            if [ -n "$major" ]; then
              full=$(yq ".engines.$recipe.versions.\"$major\"" "$idx")
            else
              full=$(yq ".engines.$recipe.versions | to_entries | .[-1].value" "$idx")
            fi
            url=$(yq ".engines.$recipe.artifacts.\"$full\".\"$triple\".url" "$idx")
            [ "$url" != "null" ] || { echo "::error::no $triple artifact for $recipe $full" >&2; return 1; }
            mkdir -p "/tmp/x-$recipe"
            curl -sfL "$url" | tar -xz -C "/tmp/x-$recipe"
            find "/tmp/x-$recipe" -maxdepth 3 -type d -name bin | head -1
          }
          case "${{ matrix.module }}" in
            postgres)
              dir=$(fetch postgres 16)
              { echo "DOZE_POSTGRES_BINDIR=$dir"; echo "DOZE_POSTGRES_VERSION=16"; } >> "$GITHUB_ENV" ;;
            valkey)
              dir=$(fetch valkey)
              echo "DOZE_VALKEY_BINDIR=$dir" >> "$GITHUB_ENV" ;;
            kvrocks)
              dir=$(fetch kvrocks)
              echo "DOZE_KVROCKS_BINDIR=$dir" >> "$GITHUB_ENV" ;;
            ferret)
              fdir=$(fetch ferretdb); ddir=$(fetch documentdb)
              { echo "DOZE_FERRET_BINDIR=$fdir"; echo "DOZE_DOCUMENTDB_BINDIR=$ddir"; } >> "$GITHUB_ENV" ;;
            mariadb)
              dir=$(fetch mariadb 11.4)
              { echo "DOZE_MARIADB_BINDIR=$dir"; echo "DOZE_MARIADB_VERSION=11.4"; } >> "$GITHUB_ENV" ;;
            temporal)
              dir=$(fetch temporal 1.1)
              { echo "DOZE_TEMPORAL_BINDIR=$dir"; echo "DOZE_TEMPORAL_VERSION=1.1"; } >> "$GITHUB_ENV" ;;
            kafka|aws)
              echo "embedded engine (doze-kafka / doze-aws compiled into the plugin): no backend to fetch" ;;
            *)
              echo "::error::module '${{ matrix.module }}' has no backend mapping in release.yml — add one" >&2
              exit 1 ;;
          esac
      - name: Run acceptance
        run: go test -tags acceptance -v -timeout 20m ./modules/${{ matrix.module }}/...

  build-and-publish:
    needs: [test, bumped, acceptance]
    # acceptance is skipped when nothing was bumped (a tooling/workflow-only
    # push rebuilds reproducibly and re-publishes nothing new) — that's a pass.
    if: ${{ !cancelled() && needs.test.result == 'success' && (needs.acceptance.result == 'success' || needs.acceptance.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }

      # Plugins are pure-Go cross-compiles built from this repo's own source.
      # Each module's PUBLISHED index.yaml is downloaded first so dzm merges
      # cumulatively — older releases stay resolvable for pinned lockfiles, and
      # the immutability guard (same version, different bytes -> hard error)
      # actually protects CI rebuilds.
      - name: Build modules
        run: |
          go build -o /tmp/dzm ./cmd/dzm
          for name in $(/tmp/dzm versions | jq -r 'keys[]'); do
            mkdir -p "dist/$name"
            curl -sfL "https://github.com/${{ github.repository }}/releases/download/$name/index.yaml" \
              -o "dist/$name/index.yaml" || rm -f "dist/$name/index.yaml"
          done
          /tmp/dzm --repo "$PWD" --out dist --module "${{ inputs.module || 'all' }}"

      # Generate each module's meta.yaml from its driver's Describe() (single source
      # of truth) so publish ships it as a release asset alongside index.yaml.
      # Describers are mandatory now — a failure here is a real bug, not noise.
      - name: Generate metadata
        run: /tmp/dzm meta --out dist --module "${{ inputs.module || 'all' }}"

      # Publish each module folder to its own rolling release. gh release upload
      # --clobber merges new triples into the existing release cumulatively.
      - name: Publish per-module releases
        id: publish
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          built=()
          for dir in dist/*/; do
            name=$(basename "$dir")
            gh release view "$name" >/dev/null 2>&1 || \
              gh release create "$name" --title "$name module" --notes "doze $name plugin module"
            # GitHub's release API throws transient 5xxs; a flaky upload must not
            # fail the whole release.
            for attempt in 1 2 3; do
              gh release upload "$name" "$dir"/* --clobber && break
              [ "$attempt" = 3 ] && exit 1
              echo "upload of $name failed (attempt $attempt), retrying in 15s…"
              sleep 15
            done
            built+=("$name")
          done
          # Emit the built module names as a JSON array for the registry dispatch.
          printf '%s\n' "${built[@]}" | jq -R . | jq -sc . > /tmp/built.json
          echo "modules=$(cat /tmp/built.json)" >> "$GITHUB_OUTPUT"

      # Tell doze-registry to sign + publish the just-built modules into the signed
      # Cloudflare registry (the only path doze core actually trusts). The signing
      # key lives ONLY in doze-registry, so we dispatch rather than sign here.
      # REGISTRY_DISPATCH_TOKEN: a fine-grained PAT/App token with contents:write
      # on doze-registry (github.token cannot cross repositories).
      # The payload carries the expected versions so the signer can WAIT for the
      # release-asset CDN to serve the just-uploaded index (a dispatch fired
      # seconds after `--clobber` can otherwise sign a stale index and no-op).
      - name: Notify registry to sign + publish
        if: steps.publish.outputs.modules != '[]'
        env: { GH_TOKEN: '${{ secrets.REGISTRY_DISPATCH_TOKEN }}' }
        # --input with a jq-built body sends modules as a real JSON array and
        # versions as a real object. `gh api -f` sends everything as strings,
        # which made the receiver's `jq '.[]'` silently iterate nothing — the
        # dispatch-triggered publishes signed zero modules.
        run: |
          jq -n \
            --argjson m '${{ steps.publish.outputs.modules }}' \
            --argjson v "$(/tmp/dzm versions)" \
            '{event_type: "modules-published", client_payload: {modules: $m, versions: $v}}' \
          | gh api repos/doze-dev/doze-registry/dispatches --input -
