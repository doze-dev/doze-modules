# Build + unit-test the engine modules on every PR and push: config decode, the
# AWS in-process server tests, the dzm meta drift guard, … on Linux and macOS.
# doze-sdk is a normal tagged dependency now — plain single checkout.
name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
